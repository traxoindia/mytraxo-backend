server:
  port: ${SERVER_PORT:8080}

spring:

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      auto-index-creation: true  # <--- Align this exactly with "uri"
       

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    accessMinutes: 720
    refreshDays: 30
  cors:
    allowedOrigins: ${APP_CORS_ALLOWEDORIGINS:http://localhost:5173}
